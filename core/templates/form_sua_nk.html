{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">Sửa thông tin nhân khẩu</h2>
    <div class="header-actions">
        <a href="{% url 'nhankhau' %}" class="btn">
            <i class="fas fa-arrow-left"></i> Quay lại
        </a>
    </div>
</div>

<div class="dashboard-panels">
    <div class="panel">
        <div class="panel-body">
            <form id="editPersonForm" method="post">
                {% csrf_token %}
                
                <div class="form-section">
                    <h4><i class="fas fa-exchange-alt"></i> Nội dung thay đổi</h4>
                    <div class="form-group">
                        <label class="required">Chọn loại thao tác</label>
                        <select id="moveType" name="move_type" class="form-input" onchange="handleMoveTypeChange()">
                            <option value="">-- Chọn loại --</option>
                            <option value="transfer">Chuyển đi</option>
                            <!-- <option value="update">Cập nhật thông tin</option> -->
                            <option value="past">Qua đời</option>
                        </select>
                    </div>

                    <div id="transferFields" style="display: none;">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Ghi chú</label>
                                <input type="text" id="transferNote" name="transfer_note" class="form-input" 
                                       placeholder="Ghi chú về việc chuyển đi">
                            </div>
                            <div class="form-group">
                                <label class="required">Ngày chuyển đi</label>
                                <input type="date" id="transferDate" name="ngay_chuyen_di" class="form-input">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="required">Nơi chuyển: Chọn nơi chuyển giữa hộ khẩu khác & khu vực khác</label>
                            <select id="transferDestinationType" name="transfer_destination_type" class="form-input" onchange="handleDestinationTypeChange()">
                                <option value="">-- Chọn nơi chuyển --</option>
                                <option value="household">Hộ khẩu khác</option>
                                <option value="area">Khu vực khác</option>
                            </select>
                        </div>

                        <div id="householdSelection" style="display: none;">
                            <div class="form-group">
                                <label class="required">Chọn hộ khẩu mới</label>
                                <select id="newHousehold" name="new_household" class="form-input">
                                    <option value="">-- Chọn hộ khẩu --</option>
                                    {% for hh in household %}
                                    <option value="{{ hh.ma_ho_khau }}">{{ hh.ma_ho_khau }} - {{ hh.ten_chu_ho }} ({{ hh.dia_chi }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div id="areaInput" style="display: none;">
                            <div class="form-group">
                                <label class="required">Địa chỉ nơi chuyển đến</label>
                                <input type="text" id="transferAddress" name="noi_chuyen_den" 
                                       class="form-input" placeholder="Nhập địa chỉ khu vực chuyển đến">
                            </div>
                        </div>
                    </div>

                    <div id="pastFields" style="display: none;">
                        <div class="form-group">
                            <label>Ghi chú</label>
                            <input type="text" id="pastNote" name="ghi_chu" class="form-input" 
                                   placeholder="Ghi chú về việc qua đời">
                        </div>
                    </div>
                </div>

                <div class="form-section" id="personalInfoSection" style="display: none;">
                    <h4><i class="fas fa-user"></i> Thông tin cá nhân</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">Họ và tên</label>
                            <input type="text" id="personFullName" name="ho_ten" class="form-input" 
                                   placeholder="Nhập họ và tên đầy đủ" value="{{ person.ho_ten }}" required>
                        </div>
                        <div class="form-group">
                            <label>Bí danh</label>
                            <input type="text" id="personAlias" name="bi_danh" class="form-input" 
                                   placeholder="Tên gọi khác (không bắt buộc)" value="{{ person.bi_danh }}">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">Ngày sinh</label>
                            <input type="date" id="personDob" name="ngay_sinh" class="form-input" value="{{ person.ngay_sinh|date:'Y-m-d' }}" required>
                        </div>
                        <div class="form-group">
                            <label class="required">Giới tính</label>
                            <input type="text" id="personGender" name="gioi_tinh" class="form-input" value="{{ person.gioi_tinh }}" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Nơi sinh</label>
                            <input type="text" id="personBirthPlace" name="noi_sinh" class="form-input" 
                                   placeholder="Bệnh viện, Phường/Xã..." value="{{ person.noi_sinh }}">
                        </div>
                        <div class="form-group">
                            <label>Quê quán</label>
                            <input type="text" id="personHometown" name="nguyen_quan" class="form-input" 
                                   placeholder="Phường/Xã, Quận/Huyện..." value="{{ person.nguyen_quan }}">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">Quan hệ với chủ hộ</label>
                            <input type="text" id="personRelation" name="quan_he_voi_chu_ho" class="form-input" 
                                   placeholder="Vợ/Chồng, Con..." value="{{ person.quan_he_voi_chu_ho }}" required> 
                        </div>
                        <div class="form-group">
                            <label>Số CMND/CCCD</label>
                            <input type="text" id="personIdNumber" name="cccd" class="form-input" 
                                   placeholder="Nhập số căn cước công dân" value="{{ person.cccd }}">
                            <small class="help-text">Có thể để trống cho trẻ em chưa có giấy tờ</small>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Ngày cấp CMND/CCCD</label>
                            <input type="date" id="personIdIssueDate" name="ngay_cap_cccd" class="form-input" value="{{ person.ngay_cap_cccd|date:'Y-m-d' }}">
                        </div>
                        <div class="form-group">
                            <label>Nơi cấp CMND/CCCD</label>
                            <input type="text" id="personIdIssuePlace" name="noi_cap_cccd" class="form-input" 
                                   placeholder="Nơi cấp..." value="{{ person.noi_cap_cccd }}">
                        </div>
                    </div>
                </div>

                <div class="form-section" id="residenceSection" style="display: none;">
                    <h4><i class="fas fa-map-marker-alt"></i> Thông tin đăng ký thường trú</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ngày đăng ký thường trú</label>
                            <input type="date" id="personResidenceRegDate" name="ngay_dang_ky_thuong_tru" class="form-input" value="{{ person.ngay_dang_ky_thuong_tru|date:'Y-m-d' }}">
                        </div>
                        <div class="form-group">
                            <label>Địa chỉ nơi thường trú trước khi chuyển đến</label>
                            <input type="text" id="personPreviousResidence" name="dia_chi_truoc_khi_chuyen" class="form-input" 
                                   placeholder="Địa chỉ cũ..." value="{{ person.dia_chi_truoc_khi_chuyen }}">
                        </div>
                    </div>
                </div>

                <div class="form-section" id="workInfoSection" style="display: none;">
                    <h4><i class="fas fa-briefcase"></i> Thông tin nghề nghiệp</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nghề nghiệp</label>
                            <input type="text" id="personOccupation" name="nghe_nghiep" class="form-input" 
                                   placeholder="Nhập nghề nghiệp hiện tại" value="{{ person.nghe_nghiep }}">
                        </div>
                        <div class="form-group">
                            <label>Nơi làm việc</label>
                            <input type="text" id="personWorkplace" name="noi_lam_viec" class="form-input" 
                                   placeholder="Tên công ty/cơ quan" value="{{ person.noi_lam_viec }}">
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn primary-1">
                        <i class="fas fa-save"></i> Cập nhật
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="successMessage" class="alert alert-success" style="display: none;">
    <i class="fas fa-check-circle"></i>
    <span>Cập nhật nhân khẩu thành công!</span>
</div>

<script src="{% static 'js/form_sua_nk.js' %}"></script>
<link rel="stylesheet" href="{% static 'css/form_sua_nk.css' %}">
{% endblock %}
