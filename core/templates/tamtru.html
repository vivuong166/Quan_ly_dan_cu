{% extends 'base.html' %}
{% load static %}
{% block content %}
<h2>Quản lý Tạm Trú</h2>

<div class="tvtt-wrap">
    <!-- Tạm trú -->
    <section id="tab-tt" class="tvtt-panel active">
        <form id="formTt" class="tvtt-form">
            <div class="row">
                <label>Họ tên</label>
                <input id="tt_ho_ten" placeholder="Họ tên">
                <label>Ngày sinh</label>
                <input id="tt_ngay_sinh" type="date">
            </div>
            <div class="row">
                <label>CMND/CCCD</label>
                <input id="tt_cmnd" placeholder="Số CMND/CCCD">
                <label>Nghề nghiệp</label>
                <input id="tt_nghe_nghiep" placeholder="Nghề nghiệp">
            </div>
            <div class="row">
                <label>Hộ khẩu tạm trú</label>
                <input id="tt_dia_chi" placeholder="Địa chỉ, chủ nhà">
            </div>
            <div class="row">
                <label>Ngày đến</label>
                <input id="tt_ngay_den" type="date">
                <label>Thời hạn</label>
                <input id="tt_han" type="date">
            </div>
            <div class="form-actions">
                <button type="button" id="addTt" class="btn primary">Thêm tạm trú</button>
            </div>
        </form>

        <div class="list-panel">
            <h3>Danh sách quá thời hạn tạm trú</h3>
            <div class="table-container">
                <table class="table-basic">
                    <thead>
                        <tr>
                            <th>Họ và tên</th>
                            <th>Ngày sinh</th>
                            <th>Ngày bắt đầu</th>
                            <th>Ngày kết thúc</th>
                            <th style="text-align: center;">Trạng thái hoàn thành</th>
                        </tr>
                    </thead>
                    <tbody id="ttList">
                        <!-- Dữ liệu mẫu -->
                        <tr data-id="1">
                            <td><strong>Nguyễn Văn C</strong></td>
                            <td>12/05/2001</td>
                            <td>01/11/2025</td>
                            <td>15/11/2025</td>
                            <td style="text-align: center;"><input type="checkbox" checked></td>
                        </tr>
                        <tr data-id="2">
                            <td><strong>Lê Thị D</strong></td>
                            <td>08/09/1995</td>
                            <td>10/11/2025</td>
                            <td>20/11/2025</td>
                            <td style="text-align: center;"><input type="checkbox"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<!-- external JS -->
<script src="{% static 'js/tv_tt.js' %}"></script>
<link rel="stylesheet" href="{% static 'css/qltv_tt.css' %}">
<link rel="stylesheet" href="{% static 'css/nhankhau.css' %}">
{% endblock %}
