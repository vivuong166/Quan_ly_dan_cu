{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script defer src="{% static 'js/login.js' %}"></script>
</head>
<body class="login-body">
    <div class="login-main-container">
        <div class="login-card" id="loginCard">
            <div class="login-left">
                <h2 class="login-title">Đăng nhập</h2>
                <!-- <div class="login-social">
                    <a href="#" class="login-social-btn"><i class="fab fa-google"></i></a>
                    <a href="#" class="login-social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="login-social-btn"><i class="fab fa-github"></i></a>
                    <a href="#" class="login-social-btn"><i class="fab fa-linkedin-in"></i></a>
                </div> -->
                <form class="login-form" method="POST" action="">
                    {% csrf_token %}
                    <div class="login-input-group">
                        <input type="text" name="username" placeholder="Username" required autocomplete="username">
                        <i class="fa fa-user"></i>
                    </div>
                    <div class="login-input-group">
                        <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
                        <i class="fa fa-lock"></i>
                    </div>
                    <button class="login-btn" type="submit">ĐĂNG NHẬP</button>
                    {% if error %}
                        <div class="login-error">{{ error }}</div>
                    {% endif %}
                </form>
            </div>
            <div class="login-right">
                <h2>Xin chào</h2>
                <p>Hệ thống dành cho cán bộ quản lý.Theo dõi thông tin cư dân, căn hộ, phương tiện và các khoản phí.</p>
            </div>
        </div>
    </div>
</body>
</html>
